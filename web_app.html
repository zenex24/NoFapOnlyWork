<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Habits Bot</title>
    <script src="https://unpkg.com/@telegram/web-app@1.0.0"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Стартовый экран с вопросами -->
        <div id="welcome-screen" class="screen active">
            <div class="container">
                <header class="header">
                    <h1 class="logo">Atomic Habits</h1>
                </header>
                <main class="main">
                    <div class="welcome-content">
                        <h2 class="welcome-title">Добро пожаловать!</h2>
                        <p class="welcome-subtitle">Давайте начнем формировать ваши привычки</p>
                        
                        <div class="form-group">
                            <label for="username" class="form-label">Как вас зовут?</label>
                            <input type="text" id="username" class="form-input" placeholder="Введите ваше имя">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Что вы хотите сделать?</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="habit-type" value="good" checked>
                                    <span class="radio-custom"></span>
                                    Сформировать хорошую привычку
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="habit-type" value="bad">
                                    <span class="radio-custom"></span>
                                    Избавиться от плохой привычки
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="habit-options" class="form-label">Выберите привычку:</label>
                            <select id="habit-options" class="form-select">
                                <option value="exercise">Зарядка утром</option>
                                <option value="reading">Чтение книг</option>
                                <option value="meditation">Медитация</option>
                                <option value="water">Пить больше воды</option>
                                <option value="sleep">Регулярный сон</option>
                                <option value="other">Другое</option>
                            </select>
                        </div>

                        <div id="custom-habit" class="form-group hidden">
                            <label for="custom-habit-input" class="form-label">Опишите вашу привычку:</label>
                            <input type="text" id="custom-habit-input" class="form-input" placeholder="Например: 'читать 30 минут в день'">
                        </div>

                        <button id="start-btn" class="btn btn-primary">Начать</button>
                    </div>
                </main>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="main-app" class="screen">
            <div class="container">
                <header class="header">
                    <h1 class="logo">Atomic Habits</h1>
                    <nav class="nav">
                        <button class="nav-btn active" data-tab="main">Главная</button>
                        <button class="nav-btn" data-tab="chat">Чат</button>
                        <button class="nav-btn" data-tab="plan">План</button>
                        <button class="nav-btn" data-tab="challenges">Челленджи</button>
                        <button class="nav-btn" data-tab="profile">Профиль</button>
                    </nav>
                </header>
                <main class="main">
                    <!-- Вкладка "Главная" -->
                    <div id="tab-main" class="tab-content active">
                        <div class="dashboard">
                            <div class="user-info">
                                <h2 id="user-name">Добро пожаловать!</h2>
                                <p id="user-habit">Выберите привычку для начала</p>
                            </div>
                            <div class="stats">
                                <div class="stat-card">
                                    <div class="stat-number" id="streak">0</div>
                                    <div class="stat-label">Дней подряд</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number" id="total">0</div>
                                    <div class="stat-label">Всего дней</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number" id="progress">0%</div>
                                    <div class="stat-label">Прогресс</div>
                                </div>
                            </div>
                            <div class="quick-actions">
                                <button class="btn btn-secondary" id="log-habit">Записать прогресс</button>
                                <button class="btn btn-secondary" id="view-history">История</button>
                            </div>
                        </div>
                    </div>

                    <!-- Вкладка "Чат" -->
                    <div id="tab-chat" class="tab-content">
                        <div class="chat-container">
                            <div class="chat-messages" id="chat-messages"></div>
                            <div class="chat-input">
                                <input type="text" id="chat-input" placeholder="Напишите сообщение...">
                                <button id="send-message" class="btn btn-primary">Отправить</button>
                            </div>
                        </div>
                    </div>

                    <!-- Вкладка "План" -->
                    <div id="tab-plan" class="tab-content">
                        <div class="plan-container">
                            <h3>Ваш план на сегодня</h3>
                            <div class="plan-list" id="plan-list"></div>
                            <button class="btn btn-primary" id="add-task">Добавить задачу</button>
                        </div>
                    </div>

                    <!-- Вкладка "Челленджи" -->
                    <div id="tab-challenges" class="tab-content">
                        <div class="challenges-container">
                            <h3>Доступные челленджи</h3>
                            <div class="challenge-list" id="challenge-list"></div>
                        </div>
                    </div>

                    <!-- Вкладка "Профиль" -->
                    <div id="tab-profile" class="tab-content">
                        <div class="profile-container">
                            <h3>Ваш профиль</h3>
                            <div class="profile-info">
                                <div class="profile-item">
                                    <span class="profile-label">Имя:</span>
                                    <span id="profile-name">Не указано</span>
                                </div>
                                <div class="profile-item">
                                    <span class="profile-label">Цель:</span>
                                    <span id="profile-goal">Не указано</span>
                                </div>
                                <div class="profile-item">
                                    <span class="profile-label">Тип:</span>
                                    <span id="profile-type">Не указано</span>
                                </div>
                            </div>
                            <button class="btn btn-secondary" id="edit-profile">Редактировать</button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="js/web_app.js"></script>
</body>
</html>
